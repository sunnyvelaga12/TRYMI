<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7ef8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dark background matching Studio theme -->
  <rect width="100" height="100" rx="20" fill="#131313" />
  <!-- Elegant Serif 'T' matching Cormorant Garamond aesthetic -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="500" font-size="65" fill="url(#goldGrad)">T</text>
  <!-- Subtle gold border -->
  <rect x="2" y="2" width="96" height="96" rx="18" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6" />
</svg>
